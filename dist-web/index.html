      // users see no flash of light. Intentionally duplicates the storage key and
      // resolution rule from src/web/theme/theme.ts because this runs before any

      (function () {
        try {
          var pref = localStorage.getItem('strikethroo-theme');
          if (pref !== 'light' && pref !== 'dark' && pref !== 'system') pref = 'system';
          var dark = pref === 'dark' ||
            (pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) { /* no-op: never block render on storage/matchMedia errors */ }
      })();
