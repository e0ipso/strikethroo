title: Strikethroo
description: Structured AI task management with plain text files and Agent Skills
url: https://mateuaguilo.com
baseurl: "/strikethroo"

# Just the Docs theme configuration
remote_theme: just-the-docs/just-the-docs

# Theme settings — Strikethroo brand schemes (see docs/_sass/color_schemes/).
# Default load is the light scheme; the sidebar toggle swaps to strikethroo-dark.
color_scheme: strikethroo
search_enabled: true
heading_anchors: true

# Mermaid support (built into Just the Docs)
mermaid:
  version: "10.6.1"

# Navigation
nav_sort: case_sensitive

# Repository link in header
aux_links:
  "View on GitHub":
    - "https://github.com/e0ipso/strikethroo"

# Make aux links open in a new tab
aux_links_new_tab: true

# SEO and social media
author: e0ipso
twitter:
  username: e0ipso

# Jekyll plugins
plugins:
  - jekyll-sitemap
  - jekyll-feed

# Markdown processing
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# Exclude from processing
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/