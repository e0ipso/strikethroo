<!-- Tri-state color-theme toggle (System / Light / Dark) at the foot of the
     sidebar nav. Markup only — the controller lives in head_custom.html, which
     renders once and wires every .strike-theme__btn (this include is rendered
     twice by the theme, for the desktop and mobile navs). -->
<div class="strike-theme">
  <button type="button" class="strike-theme__btn" aria-label="Toggle color theme" title="Toggle color theme">
    <span class="strike-theme__icon" aria-hidden="true"></span>
    <span class="strike-theme__label">System</span>
  </button>
</div>
