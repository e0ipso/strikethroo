# Strikethroo workspace configuration.
#
# This is the single structured configuration file for the workspace: every
# configurable feature claims one top-level section here rather than adding
# its own YAML file. Edit it directly or through the Config tab of the
# Customize section in the web app (`npx strikethroo serve`) — note that
# saving from the web UI rewrites this file and does not preserve comments.
#
# Sections:
#   execution_routing — automatic per-task execution routing. Profiles are
#     arbitrary, project-defined routing categories;
#     each `description` tells the task-generation LLM when the profile
#     applies, and `models` is a list of exact execution targets (`model`
#     required; `harness` and `reasoning_effort` optional; values are copied
#     verbatim — no aliases, defaults, or translation). Task generation saves
#     only the selected profile. Immediately before each task delegation, the
#     first non-avoided target in configured order is selected by default. One
#     optional global `resolver.script` (repository-relative) can instead
#     receive that task's complete configured targets and accumulated avoid set
#     and return one non-avoided target identifier. Routing is disabled while
#     `profiles` is empty. See the customization
#     guide for the full
#     contract and an illustrative example:
#     https://strikethroo.canpicasoft.com/customization.html

execution_routing:
  profiles: {}
